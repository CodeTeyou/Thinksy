<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/styles/navbar.css" />
    <link rel="stylesheet" href="./assets/styles/global.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/logo.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/styles/task.css" />

    <title>Momento</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="navtitle">
        <img src="./assets/images/logo.png" alt="GradCap" />
        <a href="./index.html">Momento</a>
      </div>

      <div class="navselect">
        <a href="./study.html">Study</a>
        <a href="./task.html">Task</a>
        <a href="./reviewer.html">Reviewer</a>
      </div>
    </nav>

    <main class="taskpage">
      <div id="modeToggle"><img src="./assets/images/LightDarkToggle.svg" alt=""></div>
      <div class="goalsetter">
        <span id="goal">Goal:</span>
        <input type="text" id="goalinput" maxlength="25"/>
      </div>
      <div class="timerbox">
        <div class="timerholder">
          <div id="spinners">
            <button id="spinnerup">
              <img src="./assets/images/arrow.svg" alt="up" />
            </button>
            <button id="spinnerdown">
              <img src="./assets/images/arrow.svg" alt="up" />
            </button>
          </div>
          <input
            type="number"
            id="timerinput"
            max="60"
            min="0"
            step="5"
            readonly
          />
          <span id="timer">:00</span>
        </div>
        <div class="pomodoro">
          <input type="checkbox" name="pomodoroToggle" id="pomodoroToggle"/>
          <label for="pomodoroToggle">Pomodoro Mode</label>
        </div>
        <div class="timercontrols">
          <button id="start" class="timertoggle">Start</button>
          <button id="stop" class="timertoggle">Reset</button>
        </div>
      </div>
    </main>
  </body>

  <script src="./scripts/src/timer/tasktimer.js"></script>
  <script src="./scripts/design/darkmode.js"></script>
</html>
