<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../assets/styles/navbar.css" />
    <link
      rel="shortcut icon"
      href="../../assets/images/logo.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../../assets/styles/task.css" />

    <title>Thinksy</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="navtitle">
        <img src="../../assets/images/logo.ico" alt="GradCap" />
        <a href="../../index.html">Thinksy</a>
      </div>

      <div class="navselect">
        <a href="../../assets/pages/study.html">Study</a>
        <a href="../../assets/pages/task.html">Task</a>
        <a href="../../assets/pages/reviewer.html">Reviewer</a>
      </div>
    </nav>

    <div class="taskpage">
      <div class="goalsetter">
        <span id="goal">Goal:</span>
        <input type="text" id="goalinput" />
      </div>
      <div class="timerbox">
        <div class="timerholder">
          <div id="spinners">
            <button id="spinnerup">
              <img src="../../assets/images/arrow.png" alt="up" />
            </button>
            <button id="spinnerdown">
              <img src="../../assets/images/arrow.png" alt="up" />
            </button>
          </div>
          <input
            type="number"
            id="timerinput"
            max="60"
            min="0"
            step="5"
            readonly
          />
          <span id="timer">:00</span>
        </div>
        <div class="timercontrols">
          <button id="start" class="timertoggle">Start</button>
          <button id="stop" class="timertoggle">Reset</button>
        </div>
      </div>
    </div>
  </body>

  <script src="../../scripts/tasktimer.js"></script>
</html>
