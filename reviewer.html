<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/styles/navbar.css" />
    <link rel="stylesheet" href="./assets/styles/global.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/logo.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/styles/reviewer.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=delete"
    />
    <title>Momento</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="navtitle">
        <img src="./assets/images/logo.png" alt="GradCap" />
        <a href="index.html">Momento</a>
      </div>

      <div class="navselect">
        <a href="./study.html">Study</a>
        <a href="./task.html">Task</a>
        <a href="./reviewer.html">Reviewer</a>
      </div>
    </nav>
    <main class="reviewerPage">
      <div id="modeToggle">
        <img src="./assets/images/LightDarkToggle.svg" alt="" />
      </div>
      <h1 class="headerRef">Reviewer</h1>
      <div class="noteRender">
        <nav id="noteSelect"></nav>
        <textarea id="noteBox" readonly></textarea>
      </div>
      <div class="textEditor">
        <div class="editorSettings" id="editorSettings">
          <button id="addSection" title="Add Section">
            <img
              src="./assets/images/icons/add.svg"
              alt="+"
              class="editButton"
            />
          </button>
          <button id="addTitle" title="Add Section Title">
            <img
              src="./assets/images/icons/addTitle.svg"
              alt=""
              class="editButton"
            />
          </button>
            <button id="addPage" title="Add Page Footer">
            <img
              src="./assets/images/icons/addPage.svg"
              alt="+"
              class="editButton"
            />
          </button>
          <button id="boldText" title="Bold Text">
            <img
              src="./assets/images/icons/boldText.svg"
              alt=""
              class="editButton"
            />
          </button>
          <button id="underlineText" title="Underline Text">
            <img
              src="./assets/images/icons/underlineText.svg"
              alt=""
              class="editButton"
            />
          </button>
          <button id="italicText" title="Italicize Text">
            <img
              src="./assets/images/icons/italicText.svg"
              alt=""
              class="editButton"
            />
          </button>
      </div>
      <div id="documentWriter"></div>
    </main>
  </body>

  <script src="./scripts/src/textEditor.js"></script>
  <script src="./scripts/src/notes/noteRender.js"></script>
  <script src="./scripts/design/darkmode.js"></script>
</html>
