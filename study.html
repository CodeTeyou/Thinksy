<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/styles/navbar.css" />
    <link rel="stylesheet" href="./assets/styles/global.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/logo.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/styles/study.css" />
    <title>Momento</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="navtitle">
        <img src="./assets/images/logo.png" alt="GradCap" />
        <a href="./index.html">Momento</a>
      </div>

      <div class="navselect">
        <a href="./study.html">Study</a>
        <a href="./task.html">Task</a>
        <a href="./reviewer.html">Reviewer</a>
      </div>
    </nav>

    <main class="studypage">
      <div id="modeToggle">
        <img src="./assets/images/LightDarkToggle.svg" alt="" />
      </div>
      <div class="timerbox" id="timerBox">
        <div class="timerholder">
          <div id="spinners">
            <button id="spinnerup">
              <img src="./assets/images/arrow.svg" alt="up" />
            </button>
            <button id="spinnerdown">
              <img src="./assets/images/arrow.svg" alt="down" />
            </button>
          </div>
          <input type="number" id="timerinput" min="0" step="5" readonly />
          <span id="timer">:00</span>
        </div>
        <div class="timercontrols">
          <button id="start" class="timertoggle">Start</button>
          <button id="stop" class="timertoggle">Reset</button>
        </div>
      </div>

      <button id="openToggle" data-toggled="true">
        <img src="./assets/images/arrow-round.svg" alt=">" />
      </button>

      <div class="notes" id="noteBox">
        <label for="keynotes">Key Notes</label>
        <textarea
          id="keynotes"
          name="keynotes"
          placeholder="Type Key Notes Here..."
        ></textarea>
        <div class="savebox">
          <!-- Add A "Duplicate Or Overwrite Prompt" -->
          <div class="savename">
            <label for="nameInput">Name</label>
            <input
              type="text"
              id="notename"
              name="nameInput"
              maxlength="25"
              list="savednotes"
            />
            <datalist id="savednotes"></datalist>
          </div>
          <button id="save">Save</button>
        </div>
      </div>
    </main>
  </body>

  <script src="./scripts/timer.js"></script>
  <script src="./scripts/keynotes.js"></script>
  <script src="./scripts/darkmode.js"></script>
</html>
